<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <style>
    :root {
      --cor-escudo: #1E3A8A;
      --cor-destaque: #F59E0B;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --cor-escudo: #3B82F6;
        --cor-destaque: #FBBF24;
      }
    }

    .classe-escudo {
      stroke: var(--cor-escudo);
      fill: none;
      stroke-width: 8;
      stroke-linejoin: round;
      transition: stroke 0.3s ease;
    }

    .classe-asa {
      stroke: var(--cor-destaque);
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s ease;
    }

    .classe-pilar {
      stroke: var(--cor-escudo);
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke 0.3s ease;
    }

    .classe-ponto {
      fill: var(--cor-destaque);
      transition: fill 0.3s ease;
    }
  </style>

  <!-- Desenho do Escudo de Proteção -->
  <path class="classe-escudo" d="M60 14C80 14 98 22 98 42C98 72 74 98 60 106C46 98 22 72 22 42C22 22 40 14 60 14Z" />

  <!-- Asa de Proteção / Letra "A" -->
  <path class="classe-asa" d="M38 52L60 74L82 52" />

  <!-- Pilar Central -->
  <line class="classe-pilar" x1="60" y1="36" x2="60" y2="58" />

  <!-- Ponto Focal -->
  <circle class="classe-ponto" cx="60" cy="30" r="5" />
</svg>